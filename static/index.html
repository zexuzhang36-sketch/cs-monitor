<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CS2 饰品行情监控 v2</title>
<script src="/echarts.min.js"></script>
<style>
:root {
  --bg: #0d0f12; --card: #161a1f; --border: #1e2329;
  --text: #d1d4d8; --dim: #6b7280; --accent: #3b82f6;
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --purple: #8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;min-height:100vh}
a{color:var(--accent)}

/* Header */
.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;
}
.topbar h1{font-size:1rem;white-space:nowrap;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--dim);flex-wrap:wrap}
.badge{background:#333;color:#fff;border-radius:10px;padding:2px 9px;font-size:.72rem;border:none;cursor:pointer}
.badge.alert{background:var(--red);animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* Container */
.wrap{max-width:1500px;margin:0 auto;padding:12px 16px}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{
  padding:7px 16px;border:1px solid var(--border);background:transparent;color:var(--dim);
  cursor:pointer;font-size:.8rem;border-radius:6px 6px 0 0;white-space:nowrap;transition:.15s
}
.tab:hover{color:var(--text)}
.tab.on{background:var(--card);color:var(--text);border-bottom-color:var(--card)}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px;margin-bottom:14px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;cursor:pointer;transition:.15s
}
.card:hover{border-color:var(--accent)}
.card.sel{border-color:var(--accent);box-shadow:0 0 10px rgba(59,130,246,.12)}
.card .cname{font-size:.73rem;color:var(--dim);margin-bottom:3px;display:flex;justify-content:space-between}
.card .cprice{font-size:1.1rem;font-weight:700}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--dim)}

/* Panels */
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.ptitle{font-size:.85rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ptitle::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}
.row2{display:grid;grid-template-columns:2fr 1fr;gap:10px}
@media(max-width:900px){.row2{grid-template-columns:1fr}}
.chart{width:100%;height:350px}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.tbl th{color:var(--dim);font-weight:500;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:.72rem}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tr:hover{background:rgba(59,130,246,.04)}

/* Search */
.sbar{display:flex;gap:8px;margin-bottom:10px}
.sbar input{flex:1;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;outline:none}
.sbar input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:.8rem;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-s{padding:4px 10px;font-size:.72rem}
.btn-o{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-r{background:var(--red);border-color:var(--red)}

/* Alerts */
.aitem{padding:8px 10px;border-radius:6px;margin-bottom:4px;font-size:.75rem;border-left:3px solid var(--red);background:rgba(239,68,68,.06)}
.aitem .atime{color:var(--dim);font-size:.68rem;margin-top:2px}
.nodata{color:var(--dim);font-size:.82rem;text-align:center;padding:24px}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-inner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal-inner input,.modal-inner select{width:100%;padding:7px 10px;margin-bottom:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.82rem}

/* Email */
.email-cfg input{width:100%;padding:6px 10px;margin-bottom:5px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.78rem}

/* Period buttons */
.pbtn{padding:4px 11px;font-size:.7rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer}
.pbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Detail skin cards */
.plats{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.plat{background:var(--bg);border-radius:8px;padding:9px 12px;min-width:125px;flex-shrink:0}
.plat .pname{font-size:.68rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.plat .pval{font-size:.78rem}

/* Footer */
.ft{text-align:center;color:var(--dim);font-size:.7rem;padding:12px;border-top:1px solid var(--border);margin-top:30px}

/* Mobile */
@media(max-width:768px){
  .wrap{padding:8px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px}
  .card{padding:8px 10px}
  .card .cprice{font-size:.95rem}
  .topbar{padding:8px 12px}
  .topbar h1{font-size:.88rem}
  .sbar input{font-size:16px}
  .tbl{font-size:.7rem}
  .chart{height:280px}
  .plats{gap:6px}.plat{min-width:110px;padding:7px 10px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="dot"></span>CS2 市场监控 v2</h1>
  <div class="topbar-right">
    <button class="btn btn-s btn-o" onclick="Notification.requestPermission()">桌面通知</button>
    <span id="clock">--</span>
    <button class="badge" id="badge" onclick="showAlerts()">0</button>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" onclick="tab('idx',this)">大盘指数</button>
    <button class="tab" onclick="tab('rank',this)">涨跌榜</button>
    <button class="tab" onclick="tab('hot',this)">热门系列</button>
    <button class="tab" onclick="tab('skins',this)">皮肤监控</button>
    <button class="tab" onclick="tab('srch',this)">饰品搜索</button>
    <button class="tab" onclick="tab('wl',this)">自选管理</button>
  </div>

  <!-- TAB: 大盘指数 -->
  <div id="tab-idx">
    <div class="cards" id="cards"></div>
    <div class="row2">
      <div class="panel">
        <div class="ptitle" id="ctitle">饰品指数
          <button class="pbtn on" onclick="idxChart('init','1h',this)">分时</button>
          <button class="pbtn" onclick="idxChart('init','24h',this)">日线</button>
          <button class="pbtn" onclick="idxChart('init','7d',this)">周线</button>
        </div>
        <div class="chart" id="idxchart"></div>
      </div>
      <div class="panel">
        <div class="ptitle">异动提醒 · <a href="#" onclick="toggleEmail();return false" style="font-size:.72rem;">邮箱设置</a></div>
        <div class="email-cfg" id="emailCfg" style="display:none;margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;">
          <div style="font-size:.7rem;color:var(--dim);margin-bottom:4px;">QQ邮箱通知 | <a href="https://service.mail.qq.com/detail/0/75" target="_blank">获取授权码</a></div>
          <input id="eSender" placeholder="QQ邮箱"><input id="eAuth" type="password" placeholder="授权码"><input id="eRecv" placeholder="接收邮箱(默认同上)">
          <div style="display:flex;gap:6px;"><button class="btn btn-s" onclick="saveEmail()">保存</button><button class="btn btn-s btn-o" onclick="testEmail()">测试</button><span id="eMsg" style="font-size:.7rem;"></span></div>
        </div>
        <div id="alerts"><div class="nodata">暂无</div></div>
      </div>
    </div>
  </div>

  <!-- TAB: 涨跌榜 -->
  <div id="tab-rank" style="display:none">
    <div class="ptitle">涨跌排行榜
      <button class="pbtn on" onclick="loadRank('rise',this)">涨幅榜</button>
      <button class="pbtn" onclick="loadRank('fall',this)">跌幅榜</button>
      <button class="pbtn" onclick="loadRank('hot',this)">热门成交</button>
    </div>
    <div class="panel" style="overflow-x:auto">
      <table class="tbl"><thead><tr><th>#</th><th>名称</th><th>价格</th><th>涨跌</th><th>涨跌幅</th><th>成交量</th></tr></thead>
      <tbody id="rankBody"><tr><td colspan="6" class="nodata">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- TAB: 热门系列 -->
  <div id="tab-hot" style="display:none">
    <div class="ptitle">热门收藏品系列</div>
    <div class="cards" id="hotCards"><div class="nodata">加载中...</div></div>
  </div>

  <!-- TAB: 皮肤监控 -->
  <div id="tab-skins" style="display:none">
    <div class="ptitle">成交量异动监控
      <span style="font-size:.7rem;color:var(--dim);font-weight:400;">| 1小时成交 ¥100↓≥50件 ¥100~1k≥20 ¥1k~10k≥10 ¥10k↑≥5</span>
    </div>
    <div class="panel" style="overflow-x:auto">
      <table class="tbl"><thead><tr><th>名称</th><th>价格</th><th>15min成交</th><th>阈值</th><th>总成交</th><th>操作</th></tr></thead>
      <tbody id="skinBody"><tr><td colspan="6" class="nodata">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- TAB: 饰品搜索 -->
  <div id="tab-srch" style="display:none">
    <div class="sbar">
      <input id="sInput" placeholder="搜索饰品... 如 AK-47 红线, M4A1 喧嚣, AWP 二西莫夫" onkeydown="if(event.key==='Enter')search()">
      <button class="btn" onclick="search()">搜索</button>
    </div>
    <div id="sResults"></div>
    <div id="skinDetail" style="display:none"></div>
  </div>

  <!-- TAB: 自选管理 -->
  <div id="tab-wl" style="display:none">
    <div class="ptitle">自选指数监控</div>
    <div class="panel" style="overflow-x:auto">
      <table class="tbl"><thead><tr><th>名称</th><th>当前价格</th><th>涨跌</th><th>阈值</th><th>操作</th></tr></thead>
      <tbody id="wlBody"><tr><td colspan="5" class="nodata">暂无</td></tr></tbody></table>
    </div>
  </div>
</div>

<div class="ft">csqaq.com | 20s采集 | 5min巡检 | QQ邮件通知</div>

<script>
// ========== GLOBAL STATE ==========
var indices=[], sel='init', idxChartInst=null, skinChartInst=null, curPeriod='24h', alerts=[];

// ========== TAB SWITCH ==========
function tab(name,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  var tabs=['idx','rank','hot','skins','srch','wl'];
  tabs.forEach(function(t){document.getElementById('tab-'+t).style.display=(t===name)?'':'none'});
  if(name==='rank') loadRank('rise');
  if(name==='hot') loadHotSeries();
  if(name==='skins') loadSkinMon();
  if(name==='wl') loadWl();
  if(name==='idx' && idxChartInst) idxChartInst.resize();
}

// ========== DASHBOARD ==========
function loadDash(){
  fetch('/api/dashboard').then(function(r){return r.json()}).then(function(d){
    indices=d.indices||[];
    document.getElementById('clock').textContent='更新:'+fmt(d.last_update);
    var b=document.getElementById('badge');b.textContent=(d.alert_count||0)+'提醒';
    b.className='badge'+(d.alert_count>0?' alert':'');
    renderCards();
  });
  fetch('/api/alerts?limit=12').then(function(r){return r.json()}).then(function(a){
    alerts=a||[];
    var h='';
    if(!a.length) h='<div class=\"nodata\">暂无提醒</div>';
    else a.forEach(function(x){h+='<div class=\"aitem\"><div>'+x.message+'</div><div class=\"atime\">'+fmt(x.created_at)+'</div></div>'});
    document.getElementById('alerts').innerHTML=h;
  });
}

function renderCards(){
  var h='';
  indices.forEach(function(i){
    var cls=i.chg_rate>0.1?'up':(i.chg_rate<-0.1?'down':'flat');
    var arr=i.chg_rate>0.1?'▲':(i.chg_rate<-0.1?'▼':'─');
    h+='<div class="card'+(i.name_key===sel?' sel':'')+'" onclick="selCard(\''+i.name_key+'\')">'+
      '<div class="cname">'+i.name+' <span class="watch-star" onclick="event.stopPropagation();toggleW(\''+i.name_key+'\',\''+i.name+'\')" style="color:var(--orange);font-size:.75rem;cursor:pointer;">⭐</span></div>'+
      '<div class="cprice">'+(i.market_index||0).toFixed(2)+'</div>'+
      '<div style="font-size:.75rem;font-weight:600;" class="'+cls+'">'+arr+' '+(i.chg_num>0?'+':'')+(i.chg_num||0).toFixed(2)+' ('+(i.chg_rate>0?'+':'')+(i.chg_rate||0).toFixed(2)+'%)</div></div>';
  });
  document.getElementById('cards').innerHTML=h;
}

function selCard(nk){sel=nk;renderCards();idxChart(nk,curPeriod)}

function idxChart(nk,period,btn){
  if(btn){document.querySelectorAll('#ctitle .pbtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
  curPeriod=period;
  var name=nk;indices.forEach(function(i){if(i.name_key===nk)name=i.name;});
  document.getElementById('ctitle').innerHTML=name+
    ' <button class="pbtn'+(period==='1h'?' on':'')+'" onclick="idxChart(\''+nk+'\',\'1h\',this)">分时</button>'+
    '<button class="pbtn'+(period==='24h'?' on':'')+'" onclick="idxChart(\''+nk+'\',\'24h\',this)">日线</button>'+
    '<button class="pbtn'+(period==='7d'?' on':'')+'" onclick="idxChart(\''+nk+'\',\'7d\',this)">周线</button>';

  if(typeof echarts==='undefined'){setTimeout(function(){idxChart(nk,period)},1000);return}
  var dom=document.getElementById('idxchart');
  if(idxChartInst&&!idxChartInst.isDisposed())idxChartInst.dispose();
  idxChartInst=echarts.init(dom);

  fetch('/api/history/'+nk+'?period='+period).then(function(r){return r.json()}).then(function(d){
    var pts=d.points||[];if(!pts.length){dom.innerHTML='<div class=\"nodata\">数据累积中...</div>';return}
    var isOHLC=pts[0].open!==undefined,dates=[],oData=[],vData=[];
    if(isOHLC){
      pts.forEach(function(p){oData.push([p.open,p.close,p.low,p.high]);dates.push(p.t);});
      var ma5=[],ma10=[];
      for(var i=0;i<oData.length;i++){
        if(i<4){ma5.push(null);ma10.push(null);continue}
        var s5=0;for(var j=0;j<5;j++)s5+=oData[i-j][1];ma5.push(+(s5/5).toFixed(2));
        if(i<9){ma10.push(null);continue}
        var s10=0;for(var k=0;k<10;k++)s10+=oData[i-k][1];ma10.push(+(s10/10).toFixed(2));
      }
      var series=[
        {type:'candlestick',data:oData,itemStyle:{color:'#22c55e',color0:'#ef4444',borderColor:'#22c55e',borderColor0:'#ef4444'}},
        {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{color:'#f59e0b',width:1}},
        {name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{color:'#8b5cf6',width:1}}
      ];
    }else{
      pts.forEach(function(p){vData.push(p.price);dates.push(p.t);});
      var up=vData.length>1&&vData[vData.length-1]>=vData[0],color=up?'#22c55e':'#ef4444';
      var series=[{type:'line',data:vData,smooth:true,symbol:'none',lineStyle:{color:color,width:2},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:up?'rgba(34,197,94,.18)':'rgba(239,68,68,.18)'},{offset:1,color:'rgba(0,0,0,0)'}])}}];
    }
    idxChartInst.setOption({
      animation:false,tooltip:{trigger:'axis',backgroundColor:'#161a1f',borderColor:'#1e2329',textStyle:{color:'#d1d4d8'},axisPointer:{type:'cross'}},
      grid:{left:60,right:20,top:10,bottom:period==='1h'?30:70},
      xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#1e2329'}},axisLabel:{color:'#6b7280',fontSize:10,interval:Math.max(1,Math.floor(dates.length/8))}},
      yAxis:{type:'value',scale:true,axisLabel:{color:'#6b7280',fontSize:11},splitLine:{lineStyle:{color:'#1e2329',type:'dashed'}}},
      dataZoom:period==='1h'?[]:[{type:'slider',start:50,end:100,height:22,bottom:8,borderColor:'#1e2329',backgroundColor:'#161a1f',fillerColor:'rgba(59,130,246,.12)',handleStyle:{color:'#3b82f6'},textStyle:{color:'#6b7280'}},{type:'inside',zoomOnMouseWheel:true,moveOnMouseMove:true}],
      series:series
    });
  });
  window.addEventListener('resize',function(){idxChartInst.resize();});
}

// ========== RANK LIST ==========
function loadRank(type,btn){
  if(btn){document.querySelectorAll('#tab-rank .pbtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
  document.getElementById('rankBody').innerHTML='<tr><td colspan="6" class="nodata">加载中...</td></tr>';
  fetch('/api/rank-list?type='+type).then(function(r){return r.json()}).then(function(list){
    if(!list.length){document.getElementById('rankBody').innerHTML='<tr><td colspan="6" class="nodata">暂无数据</td></tr>';return}
    document.getElementById('rankBody').innerHTML=list.map(function(i,n){
      var cls=(i.chg_rate||0)>0?'up':((i.chg_rate||0)<0?'down':'flat');
      return '<tr><td>'+(n+1)+'</td><td><b>'+i.name+'</b></td><td>'+(i.price?i.price.toFixed(2):'--')+'</td>'+
        '<td class="'+cls+'">'+(i.chg_num>0?'+':'')+(i.chg_num||0).toFixed(2)+'</td>'+
        '<td class="'+cls+'">'+(i.chg_rate>0?'+':'')+(i.chg_rate||0).toFixed(2)+'%</td>'+
        '<td>'+(i.volume||0)+'</td></tr>';
    }).join('');
  });
}

// ========== HOT SERIES ==========
function loadHotSeries(){
  fetch('/api/hot-series').then(function(r){return r.json()}).then(function(list){
    if(!list.length){document.getElementById('hotCards').innerHTML='<div class="nodata">暂无</div>';return}
    document.getElementById('hotCards').innerHTML=list.slice(0,24).map(function(s){
      var chg=s.sell_price_1||0,cls=chg>0?'up':(chg<0?'down':'flat');
      return '<div class="card"><div class="cname">'+s.name+'<span style="font-size:.68rem;color:var(--dim);"> '+s.amount+'件</span></div>'+
        '<div class="cprice">'+(s.total_value?s.total_value.toFixed(0):'--')+'</div>'+
        '<div style="font-size:.72rem;" class="'+cls+'">1日 '+(chg>0?'+':'')+chg.toFixed(2)+'% | 7日 '+(s.sell_price_7>0?'+':'')+(s.sell_price_7||0).toFixed(2)+'%</div></div>';
    }).join('');
  });
}

// ========== SKIN MONITOR ==========
function loadSkinMon(){
  document.getElementById('skinBody').innerHTML='<tr><td colspan="6" class="nodata">加载中...</td></tr>';
  fetch('/api/skin-monitor/volume').then(function(r){return r.json()}).then(function(list){
    if(!list.length){document.getElementById('skinBody').innerHTML='<tr><td colspan="6" class="nodata">发现主流饰品中, 请稍后刷新</td></tr>';return}
    document.getElementById('skinBody').innerHTML=list.slice(0,50).map(function(m){
      var spike=m.vol_spike||0,th=m.alert_threshold||15,isAlert=spike>=th;
      var tag=isAlert?' <span style="background:var(--red);color:#fff;padding:1px 5px;border-radius:3px;font-size:.65rem;">异动</span>':'';
      return '<tr style="'+(isAlert?'border-left:3px solid var(--red);':'')+'">'+
        '<td><b>'+m.skin_name+'</b>'+tag+'</td>'+
        '<td>'+(m.current_price||0).toFixed(2)+'</td>'+
        '<td style="font-weight:600;color:'+(isAlert?'var(--red)':'var(--text)')+';">'+(spike||0)+'</td>'+
        '<td>'+th+'</td><td>'+(m.current_volume||0)+'</td>'+
        '<td><button class="btn btn-s btn-r" onclick="removeSM('+m.skin_id+')">删</button></td></tr>';
    }).join('');
  });
}
function removeSM(sid){fetch('/api/skin-monitor/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skin_id:sid})}).then(function(){loadSkinMon()})}

// ========== SEARCH ==========
function search(){
  var q=document.getElementById('sInput').value.trim();if(!q)return;
  document.getElementById('sResults').innerHTML='<div class="nodata">搜索中...</div>';
  document.getElementById('skinDetail').style.display='none';
  fetch('/api/search?q='+encodeURIComponent(q)).then(function(r){return r.json()}).then(function(list){
    if(!list.length){document.getElementById('sResults').innerHTML='<div class="nodata">未找到</div>';return}
    document.getElementById('sResults').innerHTML=list.slice(0,25).map(function(s){
      return '<div class="card" onclick="loadSkin('+s.id+')" style="margin-bottom:5px;cursor:pointer">'+
        '<div style="font-weight:600;font-size:.82rem;">'+s.value+'</div><div style="font-size:.7rem;color:var(--dim);margin-top:2px;">ID: '+s.id+' · 点击查看详情</div></div>';
    }).join('');
  });
}

function loadSkin(sid){
  var div=document.getElementById('skinDetail');div.style.display='block';div.innerHTML='<div class="nodata">加载中...</div>';
  fetch('/api/skin/'+sid).then(function(r){return r.json()}).then(function(skin){
    var name=skin.market_hash_name||skin.name||'';
    var platforms=[{name:'Buff',sell:skin.buff_sell_price,buy:skin.buff_buy_price,sn:skin.buff_sell_num,bn:skin.buff_buy_num},
      {name:'YYYP',sell:skin.yyyp_sell_price,buy:skin.yyyp_buy_price,sn:skin.yyyp_sell_num,bn:skin.yyyp_buy_num,lease:skin.yyyp_lease_num,lp:skin.yyyp_lease_price,la:skin.yyyp_lease_annual},
      {name:'Steam',sell:skin.steam_sell_price,buy:skin.steam_buy_price,sn:skin.steam_sell_num,bn:skin.steam_buy_num},
      {name:'C5',sell:skin.c5_sell_price,buy:skin.c5_buy_price,sn:skin.c5_sell_num},{name:'IGXE',sell:skin.igxe_sell_price,sn:skin.igxe_sell_num},
      {name:'ECO',sell:skin.eco_sell_price,sn:skin.eco_sell_num}];
    var ph='';
    platforms.forEach(function(p){if(!p.sell&&!p.buy)return;
      ph+='<div class="plat"><div class="pname">'+p.name+'</div>';
      if(p.sell)ph+='<div class="pval">售 <b>'+p.sell.toFixed(2)+'</b> x'+(p.sn||0)+'</div>';
      if(p.buy)ph+='<div class="pval">购 <b>'+p.buy.toFixed(2)+'</b> x'+(p.bn||0)+'</div>';
      if(p.lease)ph+='<div class="pval">租 '+p.lease+'件 ¥'+(p.lp||0).toFixed(2)+'/d</div>';
      ph+='</div>';
    });
    var histH='';(skin._price_history||[]).forEach(function(h){var c=(h.rate||0)>=0?'var(--green)':'var(--red)';
      histH+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:.75rem;">'+
        '<span style="width:35px;color:var(--dim);">'+h.label+'</span>'+
        '<div style="flex:1;height:12px;background:var(--bg);border-radius:3px;"><div style="height:100%;width:'+Math.min(Math.abs(h.rate||0)*3,100)+'%;background:'+c+';border-radius:3px;"></div></div>'+
        '<span style="color:'+c+';min-width:55px;text-align:right;font-weight:600;">'+(h.rate>0?'+':'')+(h.rate||0).toFixed(2)+'%</span></div>';
    });
    var html='<div class="panel" style="margin-top:10px;border-color:var(--accent);">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">'+
        '<div><div style="font-weight:700;font-size:.95rem;">'+name+'</div>'+
        '<div style="font-size:.7rem;color:var(--dim);">ID:'+skin.id+' | 成交'+(skin.turnover_number||0)+'件 均价'+(skin.turnover_avg_price||0).toFixed(2)+' | 存量'+(skin.statistic||0)+' | 排名#'+(skin.rank_num||'-')+'</div></div>'+
        '<div style="display:flex;gap:6px;"><button class="btn btn-s" onclick="addSM('+skin.id+',\''+(name.replace(/'/g,''))+'\')">监控</button>'+
        '<button class="btn btn-s btn-o" onclick="document.getElementById(\'skinDetail\').style.display=\'none\'">X</button></div>'+
      '</div>'+
      '<div class="ptitle">全平台价格</div><div class="plats">'+ph+'</div>'+
      '<div class="ptitle">Buff 历史涨跌</div>'+histH+
      '<div class="ptitle" style="margin-top:12px;">K线走势'+
        ' <button class="pbtn on" onclick="skinK('+skin.id+',\'7\',this)">分时</button>'+
        ' <button class="pbtn" onclick="skinK('+skin.id+',\'30\',this)">日线</button>'+
        ' <button class="pbtn" onclick="skinK('+skin.id+',\'365\',this)">周线</button></div>'+
      '<div class="chart" id="skinChart" style="height:350px;"><div class="nodata">加载中...</div></div></div>';
    div.innerHTML=html;div.scrollIntoView({behavior:'smooth'});
    setTimeout(function(){skinK(sid,'7');},500);
  });
}

function skinK(sid,period,btn){
  if(btn){var btns=document.querySelectorAll('#skinChart').length?document.querySelectorAll('#skinDetail .pbtn'):[];btns.forEach(function(b){b.classList.remove('on')});if(btn)btn.classList.add('on')}
  if(typeof echarts==='undefined'){setTimeout(function(){skinK(sid,period,btn)},1000);return}
  var dom=document.getElementById('skinChart');if(!dom)return;dom.innerHTML='';
  if(skinChartInst&&!skinChartInst.isDisposed())skinChartInst.dispose();
  skinChartInst=echarts.init(dom);
  fetch('/api/skin/'+sid+'/chart?period='+period).then(function(r){return r.json()}).then(function(d){
    var pts=d.points||[];if(!pts.length){dom.innerHTML='<div class=\"nodata\">暂无</div>';return}
    var dates=[],oData=[];
    var bs=period==='7'?4:(period==='30'?24:168);
    for(var i=0;i<pts.length;i+=bs){
      var chunk=pts.slice(i,i+bs),o=chunk[0].price,c=chunk[chunk.length-1].price,h=o,l=o;
      chunk.forEach(function(p){if(p.price>h)h=p.price;if(p.price<l)l=p.price;});
      oData.push([o,c,l,h]);dates.push(chunk[0].t);
    }
    var ma5=[];for(var i=0;i<oData.length;i++){if(i<4){ma5.push(null);continue}var s5=0;for(var j=0;j<5;j++)s5+=oData[i-j][1];ma5.push(+(s5/5).toFixed(2));}
    skinChartInst.setOption({
      animation:false,tooltip:{trigger:'axis',backgroundColor:'#161a1f',borderColor:'#1e2329',textStyle:{color:'#d1d4d8'},axisPointer:{type:'cross'}},
      grid:{left:70,right:20,top:10,bottom:70},
      xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#1e2329'}},axisLabel:{color:'#6b7280',fontSize:10,interval:Math.max(1,Math.floor(dates.length/8))}},
      yAxis:{type:'value',scale:true,axisLabel:{color:'#6b7280'},splitLine:{lineStyle:{color:'#1e2329',type:'dashed'}}},
      dataZoom:[{type:'slider',start:50,end:100,height:22,bottom:8,borderColor:'#1e2329',backgroundColor:'#161a1f',fillerColor:'rgba(59,130,246,.12)',handleStyle:{color:'#3b82f6'},textStyle:{color:'#6b7280'}},{type:'inside',zoomOnMouseWheel:true,moveOnMouseMove:true}],
      series:[{type:'candlestick',data:oData,itemStyle:{color:'#22c55e',color0:'#ef4444',borderColor:'#22c55e',borderColor0:'#ef4444'}},{name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{color:'#f59e0b',width:1}}]
    });
  });
}
function addSM(sid,name){fetch('/api/skin-monitor/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skin_id:sid,skin_name:name})}).then(function(){alert('已添加')})}

// ========== WATCHLIST ==========
function toggleW(nk,nm){
  fetch('/api/watchlist').then(function(r){return r.json()}).then(function(wl){
    var f=wl.find(function(w){return w.name_key===nk});
    if(f) fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk})}).then(function(){renderCards()});
    else fetch('/api/watchlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk,name:nm,threshold:2})}).then(function(){renderCards()});
  });
}
function loadWl(){
  fetch('/api/watchlist').then(function(r){return r.json()}).then(function(wl){
    if(!wl.length){document.getElementById('wlBody').innerHTML='<tr><td colspan="5" class="nodata">点击大盘指数卡片上的 ⭐ 添加</td></tr>';return}
    document.getElementById('wlBody').innerHTML=wl.map(function(w){
      var cls=(w.chg_rate||0)>0.1?'up':((w.chg_rate||0)<-0.1?'down':'flat');
      return '<tr><td><b>'+w.name+'</b></td><td>'+(w.current_price||0).toFixed(2)+'</td>'+
        '<td class="'+cls+'">'+(w.chg_rate>0?'+':'')+(w.chg_rate||0).toFixed(2)+'%</td>'+
        '<td>±'+w.threshold+'%</td><td><button class="btn btn-s btn-r" onclick="remWl(\''+w.name_key+'\')">删</button></td></tr>';
    }).join('');
  });
}
function remWl(nk){fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk})}).then(function(){loadWl();renderCards()})}

function testEmail(){var s=document.getElementById('eSender').value.trim(),a=document.getElementById('eAuth').value.trim(),r=document.getElementById('eRecv').value.trim()||s;document.getElementById('eMsg').textContent='发送中...';fetch('/api/email/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender_email:s,auth_code:a,receiver_email:r})}).then(function(x){return x.json()}).then(function(d){document.getElementById('eMsg').textContent=d.msg||(d.ok?'成功':'失败')})}

function showAlerts(){fetch('/api/alerts/seen',{method:'POST'});document.getElementById('badge').className='badge';document.getElementById('badge').textContent='0'}

function fmt(iso){if(!iso)return'--';var d=new Date(iso);var p=function(n){return String(n).padStart(2,'0')};return p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds())}
