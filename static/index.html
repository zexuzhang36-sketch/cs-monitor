<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 饰品行情监控</title>
<script src="/echarts.min.js"></script>
<style>
  :root {
    --bg: #1a1d23; --card-bg: #21252b; --border: #2c313a;
    --text: #e0e0e0; --text-secondary: #8b949e;
    --green: #27ae60; --red: #e74c3c; --accent: #4a9eff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
  }
  .header {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
  .header h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-right { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; }
  .alert-badge { background: #333; color: #fff; border-radius: 12px; padding: 3px 10px; font-size: 0.75rem; cursor: pointer; border: none; }
  .alert-badge.has-alert { background: var(--red); animation: shake 0.5s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  .container { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }

  /* cards */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 18px; }
  .index-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; cursor: pointer; transition: all 0.2s;
  }
  .index-card:hover { border-color: var(--accent); }
  .index-card.selected { border-color: var(--accent); box-shadow: 0 0 12px rgba(74,158,255,0.15); }
  .index-card .card-name { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .index-card .card-price { font-size: 1.2rem; font-weight: 700; }
  .card-change.up { color: var(--green); }
  .card-change.down { color: var(--red); }
  .card-change.neutral { color: var(--text-secondary); }
  .card-change { font-size: 0.8rem; font-weight: 600; margin-top: 2px; }
  .watch-star { color: #f39c12; cursor: pointer; font-size: 0.8rem; opacity: 0.3; }
  .watch-star.active { opacity: 1; }

  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 18px; }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .chart-box { width: 100%; height: 340px; }
  .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

  .alert-item { padding: 8px 10px; border-radius: 6px; margin-bottom: 5px; font-size: 0.78rem; border-left: 3px solid var(--red); background: rgba(231,76,60,0.08); }
  .alert-item .alert-time { color: var(--text-secondary); font-size: 0.7rem; margin-top: 3px; }
  .no-data { color: var(--text-secondary); font-size: 0.85rem; text-align: center; padding: 30px; }

  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-bar input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 0.85rem; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; font-size: 0.82rem; }
  .btn:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
  .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  .footer { text-align: center; color: var(--text-secondary); font-size: 0.72rem; padding: 12px; border-top: 1px solid var(--border); margin-top: 30px; }
  #emailConfig input { width: 100%; padding: 6px 10px; margin-bottom: 5px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.8rem; }
  .tabs { display: flex; gap: 2px; margin-bottom: 14px; }
  .tab-btn { padding: 7px 16px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.82rem; border-radius: 6px 6px 0 0; }
  .tab-btn.active { background: var(--card-bg); color: var(--text); border-bottom-color: var(--card-bg); }
  .wl-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .wl-table th,.wl-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .wl-table th { color: var(--text-secondary); font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="dot"></span>CS2 饰品行情监控</h1>
  <div class="header-right">
    <button class="btn btn-sm btn-outline" onclick="Notification.requestPermission()">桌面通知</button>
    <span id="updateTime">加载中...</span>
    <button class="alert-badge" id="alertBadge" onclick="showAlerts()">0 条提醒</button>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard',this)">大盘指数</button>
    <button class="tab-btn" onclick="switchTab('watchlist',this)">自选监控</button>
    <button class="tab-btn" onclick="switchTab('skinmon',this)">皮肤监控</button>
    <button class="tab-btn" onclick="switchTab('search',this)">饰品搜索</button>
  </div>

  <div id="tab-dashboard">
    <noscript><div style="color:red;padding:20px;">请启用 JavaScript</div></noscript>
<div class="cards-grid" id="indexCards"><div class="no-data">加载中... 如长时间无数据显示，请 <b>Ctrl+Shift+R</b> 强制刷新</div></div>
    <div class="charts-row">
      <div class="panel">
        <div class="section-title" id="chartTitle">24小时走势 — 点击指数卡片查看</div>
        <div class="chart-box" id="mainChart"></div>
      </div>
      <div class="panel">
        <div class="section-title">异动提醒 · <a href="#" onclick="toggleEmailConfig();return false" style="color:var(--accent);font-size:0.75rem;">邮箱设置</a></div>
        <div id="emailConfig" style="display:none;margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;">
          <div style="font-size:0.72rem;color:var(--text-secondary);margin-bottom:4px;">QQ邮箱通知 | <a href="https://service.mail.qq.com/detail/0/75" target="_blank" style="color:var(--accent);">获取授权码</a></div>
          <input id="emailSender" placeholder="你的QQ邮箱">
          <input id="emailAuth" type="password" placeholder="邮箱授权码(不是QQ密码)">
          <input id="emailReceiver" placeholder="接收邮箱(默认同上)">
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm" onclick="saveEmail()">保存</button>
            <button class="btn btn-sm btn-outline" onclick="testEmail()">测试</button>
            <span id="emailMsg" style="font-size:0.75rem;"></span>
          </div>
        </div>
        <div id="alertsList"><div class="no-data">暂无提醒</div></div>
      </div>
    </div>
  </div>

  <div id="tab-watchlist" style="display:none;">
    <div class="section-title">自选监控</div>
    <div style="margin-bottom:10px;">
      <button class="btn btn-sm" onclick="openAddWatch()">+ 添加监控</button>
      <span style="font-size:0.78rem;color:var(--text-secondary);margin-left:8px;">在大盘指数卡片点 ⭐ 可快速添加</span>
    </div>
    <div class="panel">
      <table class="wl-table"><thead><tr><th>名称</th><th>当前价格</th><th>日涨跌</th><th>预警阈值</th><th>操作</th></tr></thead>
      <tbody id="wlBody"><tr><td colspan="5" class="no-data">暂无自选</td></tr></tbody></table>
    </div>
  </div>

  <div id="tab-skinmon" style="display:none;">
    <div class="section-title">成交量异动监控</div>
    <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:10px;">
      阈值: ¥100以下≥50件 | ¥100~1000≥20件 | ¥1000~10000≥10件 | ¥10000以上≥5件 | 每5分钟巡检
    </div>
    <div id="skinMonList"><div class="no-data">加载中...</div></div>
  </div>

  <div id="tab-search" style="display:none;">
    <div class="section-title">饰品搜索</div>
    <div class="search-bar">
      <input id="searchInput" placeholder="输入饰品名称，如 AK-47 | 红线 / M4A1 | 喧嚣杀戮 ..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn" onclick="doSearch()">搜索</button>
    </div>
    <div id="searchResults"></div>
    <div id="skinDetail" style="display:none;"></div>
  </div>
</div>

<div class="footer">数据来源: csqaq.com | 刷新间隔: 60秒 | 异动超 ±3% 自动邮件通知</div>

<script>
// ==================== STATE ====================
var indices = [], selected = 'init', alerts = [], watchlist = [];
var mainChart = null, emailVisible = false;

// ==================== INIT ====================
async function loadAll() {
  try {
    var d = await fetch('/api/dashboard').then(r=>r.json());
    indices = d.indices || [];
    document.getElementById('updateTime').textContent = '更新: ' + fmtTime(d.last_update);
    var cnt = d.alert_count || 0;
    var badge = document.getElementById('alertBadge');
    badge.textContent = cnt + ' 条提醒';
    badge.className = 'alert-badge' + (cnt > 0 ? ' has-alert' : '');
    renderCards();
  } catch(e) { console.error(e); }
}

function renderCards() {
  if (!indices.length) { document.getElementById('indexCards').innerHTML = '<div class="no-data">暂无数据，等待采集...</div>'; return; }
  var html = '';
  indices.forEach(function(idx) {
    var cls = idx.chg_rate > 0.1 ? 'up' : (idx.chg_rate < -0.1 ? 'down' : 'neutral');
    var arr = idx.chg_rate > 0.1 ? '▲' : (idx.chg_rate < -0.1 ? '▼' : '─');
    var sel = idx.name_key === selected ? ' selected' : '';
    html += '<div class="index-card' + sel + '" onclick="selectCard(\'' + idx.name_key + '\')">' +
      '<div class="card-name">' + idx.name + ' <span class="watch-star" onclick="event.stopPropagation();toggleWatch(\'' + idx.name_key + '\',\'' + idx.name + '\')">⭐</span></div>' +
      '<div class="card-price">' + (idx.market_index||0).toFixed(2) + '</div>' +
      '<div class="card-change ' + cls + '">' + arr + ' ' + (idx.chg_num>0?'+':'') + (idx.chg_num||0).toFixed(2) + ' (' + (idx.chg_rate>0?'+':'') + (idx.chg_rate||0).toFixed(2) + '%)</div>' +
      '</div>';
  });
  document.getElementById('indexCards').innerHTML = html;
}

function selectCard(nk) { selected = nk; renderCards(); loadChart(nk, mainChartPeriod); }

// ==================== CHART ====================
var mainChartPeriod = '24h';
function loadChart(nk, period) {
  period = period || mainChartPeriod;
  mainChartPeriod = period;
  var box = document.getElementById('mainChart');
  if (typeof echarts === 'undefined') { box.innerHTML = '<div class="no-data">图表组件加载中...</div>'; setTimeout(function(){loadChart(nk,period);},1000); return; }
  if (!mainChart) { try { mainChart = echarts.init(box); window.addEventListener('resize',function(){mainChart.resize();}); } catch(e) {} }
  if (!mainChart) return;

  var name = nk;
  indices.forEach(function(i){ if(i.name_key===nk) name = i.name; });
  document.getElementById('chartTitle').innerHTML = name + ' · ' +
    '<button class="period-btn'+(period==='1h'?' active':'')+'" onclick="loadChart(\''+nk+'\',\'1h\')" style="margin-left:8px;">分时</button>' +
    '<button class="period-btn'+(period==='24h'?' active':'')+'" onclick="loadChart(\''+nk+'\',\'24h\')">日线</button>' +
    '<button class="period-btn'+(period==='7d'?' active':'')+'" onclick="loadChart(\''+nk+'\',\'7d\')">周线</button>';

  if (mainChart && !mainChart.isDisposed()) mainChart.dispose();

  fetch('/api/history/' + nk + '?period=' + period).then(function(r){return r.json()}).then(function(d) {
    var pts = d.points || [];
    if (!pts.length) { box.innerHTML = '<div class="no-data">数据收集中...</div>'; return; }

    mainChart = echarts.init(box);
    var isOHLC = pts[0].open !== undefined;
    var upColor = '#27ae60', downColor = '#e74c3c';
    var series = [];

    if (isOHLC) {
      // OHLC K线
      var ohlcData = [], dates = [];
      pts.forEach(function(p){ ohlcData.push([p.open, p.close, p.low, p.high]); dates.push(p.t); });
      // MA5, MA10
      var ma5=[], ma10=[];
      for (var i=0;i<ohlcData.length;i++) {
        if (i<4) { ma5.push(null); ma10.push(null); continue; }
        var s5=0,s10=0;
        for (var j=0;j<5;j++) s5+=ohlcData[i-j][1];
        ma5.push(+(s5/5).toFixed(2));
        if (i<9) { ma10.push(null); continue; }
        for (var k=0;k<10;k++) s10+=ohlcData[i-k][1];
        ma10.push(+(s10/10).toFixed(2));
      }
      series = [
        {name:'',type:'candlestick',data:ohlcData,itemStyle:{color:upColor,color0:downColor,borderColor:upColor,borderColor0:downColor}},
        {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{color:'#f39c12',width:1}},
        {name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{color:'#9b59b6',width:1}},
      ];
      var xData = dates;
    } else {
      // 原始数据点线图
      var vals=[], times=[];
      pts.forEach(function(p){ vals.push(p.price); times.push(p.t); });
      var up = vals.length>1 && vals[vals.length-1] >= vals[0];
      var color = up ? upColor : downColor;
      series = [{type:'line',data:vals,smooth:true,symbol:'none',lineStyle:{color:color,width:2},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:up?'rgba(39,174,96,0.2)':'rgba(231,76,60,0.2)'},{offset:1,color:'rgba(0,0,0,0)'}])}
      }];
      var xData = times;
    }

    mainChart.setOption({
      animation: false,
      tooltip: {trigger:'axis',backgroundColor:'#21252b',borderColor:'#2c313a',textStyle:{color:'#e0e0e0'},axisPointer:{type:'cross'}},
      grid: {left:60,right:20,top:15,bottom:period==='1h'?30:70},
      xAxis: {type:'category',data:xData,axisLine:{lineStyle:{color:'#2c313a'}},axisLabel:{color:'#8b949e',fontSize:10,interval:Math.max(1,Math.floor(xData.length/8))}},
      yAxis: {type:'value',scale:true,axisLabel:{color:'#8b949e',fontSize:11},splitLine:{lineStyle:{color:'#2c313a',type:'dashed'}}},
      dataZoom: period==='1h'?[]:[
        {type:'slider',start:50,end:100,height:22,bottom:8,borderColor:'#2c313a',backgroundColor:'#21252b',fillerColor:'rgba(74,158,255,0.15)',handleStyle:{color:'#4a9eff'},textStyle:{color:'#8b949e'}},
        {type:'inside',zoomOnMouseWheel:true,moveOnMouseMove:true}
      ],
      series: series,
    });
  }).catch(function(e){ console.error(e); });
}

// ==================== ALERTS ====================
function loadAlerts() {
  fetch('/api/alerts?limit=15').then(function(r){return r.json()}).then(function(a) {
    alerts = a || [];
    var html = '';
    if (!alerts.length) html = '<div class="no-data">暂无提醒</div>';
    else alerts.forEach(function(x){ html += '<div class="alert-item"><div>' + x.message + '</div><div class="alert-time">' + fmtTime(x.created_at) + '</div></div>'; });
    document.getElementById('alertsList').innerHTML = html;
  });
}
function showAlerts() { fetch('/api/alerts/seen',{method:'POST'}); document.getElementById('alertBadge').className='alert-badge'; document.getElementById('alertBadge').textContent='0 条提醒'; }

// ==================== EMAIL ====================
function toggleEmailConfig() { var d=document.getElementById('emailConfig'); emailVisible=!emailVisible; d.style.display=emailVisible?'block':'none'; if(emailVisible) loadEmailCfg(); }
function loadEmailCfg() { fetch('/api/email/config').then(function(r){return r.json()}).then(function(c){ document.getElementById('emailSender').value=c.sender_email||''; document.getElementById('emailReceiver').value=c.receiver_email||''; }); }
function saveEmail() {
  var s=document.getElementById('emailSender').value.trim(), a=document.getElementById('emailAuth').value.trim(), r=document.getElementById('emailReceiver').value.trim()||s;
  if(!s||!a){document.getElementById('emailMsg').textContent='请填写完整';return}
  fetch('/api/email/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender_email:s,auth_code:a,receiver_email:r})}).then(function(x){return x.json()}).then(function(d){document.getElementById('emailMsg').textContent=d.msg||'已保存';});
}
function testEmail() {
  document.getElementById('emailMsg').textContent='发送中...';
  var s=document.getElementById('emailSender').value.trim(), a=document.getElementById('emailAuth').value.trim(), r=document.getElementById('emailReceiver').value.trim()||s;
  fetch('/api/email/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender_email:s,auth_code:a,receiver_email:r})}).then(function(x){return x.json()}).then(function(d){document.getElementById('emailMsg').textContent=d.msg||(d.ok?'成功':'失败');});
}

// ==================== WATCHLIST ====================
function toggleWatch(nk, nm) {
  var found = watchlist.find(function(w){return w.name_key===nk});
  if (found) { fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk})}).then(function(){loadWatchlist();renderCards();}); }
  else { fetch('/api/watchlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk,name:nm,threshold:2})}).then(function(){loadWatchlist();renderCards();}); }
}
function loadWatchlist() {
  fetch('/api/watchlist').then(function(r){return r.json()}).then(function(wl){
    watchlist = wl || [];
    var tbody = document.getElementById('wlBody');
    if (!wl.length) { tbody.innerHTML = '<tr><td colspan="5" class="no-data">暂无自选</td></tr>'; return; }
    tbody.innerHTML = wl.map(function(w){
      var cls = (w.chg_rate||0)>0.1?'card-change up':((w.chg_rate||0)<-0.1?'card-change down':'');
      return '<tr><td><b>'+w.name+'</b></td><td>'+(w.current_price||0).toFixed(2)+'</td><td class="'+cls+'">'+(w.chg_rate?(w.chg_rate>0?'+':'')+w.chg_rate.toFixed(2)+'%':'--')+'</td><td>±'+w.threshold+'%</td><td><button class="btn btn-sm btn-outline" onclick="removeWatch(\''+w.name_key+'\')">移除</button></td></tr>';
    }).join('');
  });
}
function removeWatch(nk) { fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk})}).then(function(){loadWatchlist();renderCards();}); }
function loadSkinMonList() {
  fetch('/api/skin-monitor/volume').then(function(r){return r.json()}).then(function(list){
    var div = document.getElementById('skinMonList');
    if (!list.length) { div.innerHTML = '<div class=\"no-data\">正在发现主流饰品...请稍后再刷新</div>'; return; }
    div.innerHTML = '<div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">共监控 <b>'+list.length+'</b> 个主流饰品</div>' +
      list.slice(0,30).map(function(m){
        var spikeClass = m.vol_spike >= m.alert_threshold ? 'style="border-left:3px solid var(--red);"' : '';
        var spikeTag = m.vol_spike >= m.alert_threshold ? ' <span style="background:var(--red);color:#fff;padding:1px 6px;border-radius:3px;font-size:0.7rem;">异动!</span>' : '';
        return '<div '+spikeClass+' style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">' +
          '<div><b>'+m.skin_name+'</b>'+spikeTag+
            '<div style="font-size:0.72rem;color:var(--text-secondary);">¥'+(m.current_price||0).toFixed(2)+' | 15min成交: <b>'+(m.vol_spike||0)+'件</b> (阈值'+m.alert_threshold+'件) | 总成交: '+(m.current_volume||0)+'件</div></div>' +
          '<button class="btn btn-sm btn-outline" onclick="removeSkinMon('+m.skin_id+')">移除</button></div>';
      }).join('');
  });
}
function removeSkinMon(sid) {
  fetch('/api/skin-monitor/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skin_id:sid})})
    .then(function(){ loadSkinMonList(); });
}
function addSkinMonitor(sid, name) {
  fetch('/api/skin-monitor/add',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({skin_id:sid, skin_name:name})})
    .then(function(r){return r.json()}).then(function(d){ alert(d.msg||'已添加'); });
}

function openAddWatch() {
  var nk = prompt('输入指数 name_key (如 init, lease, main_weapon):'); if (!nk) return;
  var nm = prompt('显示名称:'); if (!nm) return;
  var th = parseFloat(prompt('预警阈值 % (如 2):', '2')) || 2;
  fetch('/api/watchlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name_key:nk,name:nm,threshold:th})}).then(function(r){return r.json()}).then(function(d){alert(d.msg); loadWatchlist(); renderCards();});
}

// ==================== SEARCH ====================
var skinCache = {};
function doSearch() {
  var q = document.getElementById('searchInput').value.trim(); if (!q) return;
  document.getElementById('searchResults').innerHTML = '<div class="no-data">搜索中...</div>';
  document.getElementById('skinDetail').style.display = 'none';
  fetch('/api/search?q='+encodeURIComponent(q)).then(function(r){return r.json()}).then(function(list){
    if (!list||!list.length) { document.getElementById('searchResults').innerHTML = '<div class="no-data">未找到</div>'; return; }
    document.getElementById('searchResults').innerHTML = list.slice(0,20).map(function(s){
      return '<div class="skin-item" onclick="loadSkinDetail('+s.id+')" style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;font-size:0.85rem;transition:border-color .2s;"><div style="font-weight:600;">'+s.value+'</div><div style="color:var(--text-secondary);font-size:0.75rem;margin-top:3px;">ID: '+s.id+' - 点击查看详情</div></div>';
    }).join('');
  });
}

function loadSkinDetail(id) {
  var div = document.getElementById('skinDetail');
  div.style.display = 'block';
  div.innerHTML = '<div class="no-data">加载中...</div>';
  if (skinCache[id]) { showSkinDetail(skinCache[id]); return; }
  fetch('/api/skin/'+id).then(function(r){return r.json()}).then(function(skin){
    skinCache[id] = skin;
    showSkinDetail(skin);
  }).catch(function(e){ div.innerHTML = '<div class="no-data">加载失败: '+e+'</div>'; });
}

    '</div></div>' +

var currentSkinChart = null;
function loadSkinChart(skinId, period, btn) {
  // 切换按钮状态
  if (btn) {
    document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }
  if (typeof echarts === 'undefined') {
    var chartDom = document.getElementById('skinChart'); if (chartDom) chartDom.innerHTML = '<div class=\"no-data\">ECharts 加载中, 请稍后再试</div>';
    setTimeout(function(){ loadSkinChart(skinId, period, btn); }, 1000);
    return;
  }
  var chartDom = document.getElementById('skinChart'); if (!chartDom) return;
  chartDom.innerHTML = '<div class=\"no-data\"><span class=\"spinner\" style=\"display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;\"></span>加载中...</div>';

  fetch('/api/skin/'+skinId+'/chart?period='+period).then(function(r){return r.json()}).then(function(cd){
    var pts = cd.points || [];
    if (!pts.length) { chartDom.innerHTML = '<div class=\"no-data\">暂无图表数据</div>'; return; }

    // 聚合为 OHLC candlestick
    var ohlc = [], dates = [];
    var bucketSize = period === '7' ? 4 : (period === '30' ? 24 : 168); // 7d: ~2h bars, 30d: daily, 365d: weekly
    for (var i = 0; i < pts.length; i += bucketSize) {
      var chunk = pts.slice(i, i + bucketSize);
      var open = chunk[0].price, close = chunk[chunk.length-1].price;
      var high = open, low = open;
      chunk.forEach(function(p){ if(p.price > high) high = p.price; if(p.price < low) low = p.price; });
      ohlc.push([open, close, low, high]);
      dates.push(chunk[0].t);
    }

    // 计算 MA5, MA10
    function calcMA(data, n) {
      var result = [];
      for (var i = 0; i < data.length; i++) {
        if (i < n-1) { result.push(null); continue; }
        var sum = 0;
        for (var j = 0; j < n; j++) sum += data[i-j][1]; // close price
        result.push(+(sum/n).toFixed(2));
      }
      return result;
    }
    var ma5 = calcMA(ohlc, 5);
    var ma10 = calcMA(ohlc, 10);

    if (currentSkinChart) currentSkinChart.dispose();
    var chart = echarts.init(chartDom);
    currentSkinChart = chart;

    var upColor = '#27ae60', downColor = '#e74c3c';
    chart.setOption({
      animation: false,
      tooltip: {trigger:'axis',backgroundColor:'#21252b',borderColor:'#2c313a',textStyle:{color:'#e0e0e0'},
        axisPointer:{type:'cross'},
        formatter: function(params) {
          var d = params[0]; if (!d) return '';
          return d.axisValue + '<br/>' +
            '开: <b>' + d.data[1] + '</b> 收: <b>' + d.data[2] + '</b><br/>' +
            '低: <b>' + d.data[3] + '</b> 高: <b>' + d.data[4] + '</b>';
        }
      },
      grid: {left:70,right:20,top:20,bottom:80},
      xAxis: {type:'category',data:dates,axisLine:{lineStyle:{color:'#2c313a'}},axisLabel:{color:'#8b949e',fontSize:10,interval:Math.max(1,Math.floor(dates.length/10))}},
      yAxis: {type:'value',scale:true,axisLabel:{color:'#8b949e'},splitLine:{lineStyle:{color:'#2c313a',type:'dashed'}}},
      dataZoom: [
        {type:'slider',start:50,end:100,height:25,bottom:10,borderColor:'#2c313a',backgroundColor:'#21252b',fillerColor:'rgba(74,158,255,0.15)',handleStyle:{color:'#4a9eff'},textStyle:{color:'#8b949e'}},
        {type:'inside',zoomOnMouseWheel:true,moveOnMouseMove:true}
      ],
      series: [
        {name:'K线',type:'candlestick',data:ohlc,
          itemStyle:{color:upColor,color0:downColor,borderColor:upColor,borderColor0:downColor},
          markPoint:{data:[{type:'max',name:'最高',symbol:'pin',symbolSize:30,itemStyle:{color:upColor},label:{fontSize:10,color:'#fff'}},{type:'min',name:'最低',symbol:'pin',symbolSize:30,itemStyle:{color:downColor},label:{fontSize:10,color:'#fff'}}]}
        },
        {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{color:'#f39c12',width:1}},
        {name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{color:'#9b59b6',width:1}},
      ]
    });
    window.addEventListener('resize', function(){ chart.resize(); });
  }).catch(function(e){ chartDom.innerHTML = '<div class=\"no-data\">图表数据加载失败: '+e+'</div>'; });
}

// ==================== TABS ====================
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  ['dashboard','watchlist','skinmon','search'].forEach(function(t){ document.getElementById('tab-'+t).style.display = (t===tab)?'':'none'; });
  if (tab==='watchlist') loadWatchlist();
  if (tab==='skinmon') loadSkinMonList();
  if (tab==='dashboard' && typeof echarts !== 'undefined' && mainChart) mainChart.resize();
}
